"DescriptorMatcher3D" : { 
  "#id" : 1, 

  // compare type (0=Euclidean, 1=MED)
  "cmp" : 1, 

  // descriptor comparison size (-1=all)
  "comp_size" : 6, 

  // max descriptor distance
  "max_distance" : 12, 

  // normal direction weight
  "normal_weight" : 0
 }

"Rosbag2MessageReader" : { 
  "#id" : 2, 

  // input bag path
  "bag_path" : "", 
  "topics" : [ "/ouster/points", "/ouster/imu", "/ouster/tree" ]
 }

"ICPCUDA3D" : { 
  "#id" : 3, 
  "name" : "local_icp", 

  // linear system damping
  "damping" : 1, 

  // chi2 kernel threshold
  "kernel_threshold" : 0.200000003, 

  // max point-to-plane error
  "max_error" : 0.5, 

  // max ICP iterations
  "max_iterations" : 20, 

  // min inliers to accept a round
  "min_good_measurements" : 10, 

  // min cosine of normal angle
  "min_normal_cos" : 0.699999988, 

  // termination criteria
  "term_crit" : { 
    "#pointer" : -1
   }
 }

"TreeGenerator3D" : { 
  "#id" : 4, 
  "name" : "gen", 

  // density of points in leaf [pts/m, m^2]
  "leaf_density" : 100, 

  // lambda_max below this: leaf discarded
  "leaf_eigenvalue_threshold" : 0.00100000005, 

  // max points in leaf
  "leaf_max_points" : 100, 

  // min cos of incidence angle
  "leaf_min_normal_incidence" : 0.100000001, 

  // min points in leaf
  "leaf_min_points" : 5, 

  // below this the leaf is not flat enough
  "leaf_normal_eigenratio" : 0.100000001, 

  // propagate normal from parent to children if flat enough
  "propagate_normal" : 1, 

  // min good leaves to accept a tree
  "tree_min_good_leaves" : 500
 }

"TreeLoader3D" : { 
  "#id" : 5, 
  "name" : "loader", 

  // tree generator
  "generator" : { 
    "#pointer" : 4
   }, 

  // topic for output trees
  "out_topic" : "/kdtrees", 

  // message reader
  "reader" : { 
    "#pointer" : 2
   }, 

  // print progress to stderr
  "verbose" : 0, 

  // voxelizer
  "voxelizer" : { 
    "#pointer" : 6
   }, 

  // output writer (empty = disabled)
  "writer" : { 
    "#pointer" : -1
   }
 }

"CTICPCUDA3D" : { 
  "#id" : 7, 
  "name" : "odom_icp", 

  // linear system damping
  "damping" : 1, 

  // chi2 kernel threshold
  "kernel_threshold" : 0.200000003, 

  // max point-to-plane error
  "max_error" : 1, 

  // max ICP iterations
  "max_iterations" : 20, 

  // min inliers to accept a round
  "min_good_measurements" : 10, 

  // min cosine of normal angle
  "min_normal_cos" : 0.699999988, 

  // termination criteria
  "term_crit" : { 
    "#pointer" : -1
   }, 

  // velocity regularization weight
  "velocity_damping" : 100
 }

"Voxelizer3D" : { 
  "#id" : 6, 
  "name" : "vox", 

  // computes the covariance
  "compute_covariance" : 0, 

  // max lidar range [m]
  "range_max" : 100, 

  // min lidar range [m]
  "range_min" : 1.5, 

  // spatial voxel res [m]; 0=disable
  "space_res" : 0.0500000007, 

  // temporal voxel res [s]; 0=disable
  "time_res" : 0.0500000007, 

  // conservative boundary clipping
  "use_boundary" : 1
 }

"Localizer3D" : { 
  "#id" : 8, 
  "name" : "sink", 

  // file where to dump aligner log
  "aligner_log_file" : "", 

  // forest search range [m]
  "ba_range" : 10, 

  // descriptor matcher
  "descriptor_matcher" : { 
    "#pointer" : 1
   }, 
  "imu_acc_bias" : [ 0, 0, 0 ], 

  // file where to dump imu
  "imu_dump_file" : "", 
  "imu_gyro_bias" : [ 0, 0, 0 ], 

  // max imu gyro rotation to consider for an ICP update (rad)
  "imu_hint_max_rotation" : 0.100000001, 

  // icp covariance scaling in ekf update
  "imu_sigma_scale" : 100, 

  // local aligner for forest search
  "local_aligner" : { 
    "#pointer" : 3
   }, 

  // max rotation before new keyframe [deg]
  "max_kf_rot_deg" : 360, 

  // max translation before new keyframe [m]
  "max_kf_trans" : 10000, 

  // min inlier fraction to keep keyframe
  "min_inlier_frac" : 0.5, 

  // low pass filter for the constant vel model
  "motion_model_alpha" : 0.899999976, 

  // odometry aligner
  "odom_aligner" : { 
    "#pointer" : 7
   }, 

  // max chi2 for relocalization
  "relocalize_max_chi2" : 10, 

  // max BFS hops (-1=no limit)
  "relocalize_max_hops" : 10, 

  // min inlier ratio for relocalization
  "relocalize_min_inliers_ratio" : 0.5, 

  // min relocalization score
  "relocalize_min_score" : 3, 

  // covariance slack for chi2 test
  "relocalize_slack" : 1.5, 

  // uses a constant velocity motion model
  "use_motion_model" : 0
 }

